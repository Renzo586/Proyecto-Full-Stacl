<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hospital de Clínicas Encuestas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<header>
    <h1>Hospital de Clínicas</h1>
    <p>Módulo de Encuestas de Satisfacción</p>
</header>

<nav>
    <a href="index.html">Documentación</a>
    <a href="encuestas.html">Encuestas</a>
     <a href="ambulancias.html">Ambulancias</a>
</nav>

<main>
<section class="panel">
    <h2>Encuesta de Satisfacción</h2>
    <label for="servicio">Servicio utilizado</label>
    <input type="text" id="servicio" placeholder="Ej: Laboratorio  ">
    <label for="calificacion">Calificación (1 a 5)</label>
    <input type="number" id="calificacion" min="1" max="5">
    <label for="nombre">Nombre (Opcional)</label>
    <input type="text" id="nombre" placeholder="Ingrese su nombre">
    <label>¿Recomendaría el servicio?</label>
    <input type="button" value="Enviar Encuesta">
</section>
</main>
</body>
</html>
